# Records the real UTC time of each deploy in version.json (fallback when
# Last-Modified is unavailable). Skips runs triggered only by version.json
# commits so the workflow does not loop.
name: Stamp deploy time

on:
  push:
    branches: [main]
    paths-ignore:
      - "version.json"

concurrency:
  group: stamp-version-json
  cancel-in-progress: true

jobs:
  stamp:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Write version.json
        run: |
          TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          printf '%s\n' "{\"deployedAt\":\"$TS\"}" > version.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add version.json
          if git diff --staged --quiet; then
            echo "No changes to version.json"
            exit 0
          fi
          git commit -m "chore: stamp deploy time [skip ci]"
          git push
